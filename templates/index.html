<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>BigQuery Release Notes</h1>
                <p>Stay up to date with the latest Google Cloud BigQuery updates</p>
            </div>
            <button id="refresh-btn" class="btn" aria-label="Refresh release notes">
                <div class="spinner" id="refresh-spinner"></div>
                Refresh
            </button>
        </header>

        <main>
            <div id="releases-list" class="releases-list">
                <!-- Loaded dynamically via JavaScript -->
                <div class="state-container">
                    <div class="spinner" style="display: inline-block; width: 40px; height: 40px; border-width: 3px;"></div>
                    <p>Loading app...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
